<!DOCTYPE html>
<html lang="en">
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Todo App</title>
        <link href="https://fonts.googleapis.com/css?family=lato:300,400,700" rel="stylesheet">
        <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
    </head>
    <body class="wrapper">
        <div class="matrix">
            <img src="./eisenhower-matrix.jpg"><a class="matrix__more-inf"
                                                  href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
        </div>
        <div class="centered-main-page-element">
            <p id="top-section-for-adding-element-to-list"><label for="new-task">Add Item</label>
                <div class="element-task-new-wrapper">
                    <input id="new-task" class="element-task" type="text"><button class="btn">Add</button>
                </div>
            </p>
            <h3 class="title">Todo</h3>
            <ul id="incomplete-tasks">
                <li>
                    <input type="checkbox"><label class="element-task">Pay Bills</label>
                    <input type="text" class="element-task"><button class="edt-btn btn">Edit</button>
                    <button class="del-btn btn"><img src="./remove.svg"></button>
                </li>
                <li class="centered-main-page-element__edit-mode">
                    <input type="checkbox"><label class="element-task">Go Shopping</label>
                    <input type="text"
                           value="Go Shopping"
                           class="task"><button class="edt-btn btn">Save</button>
                    <button class="del-btn btn"><img src="./remove.svg"></button>
                </li>
            </ul>
            <h3 class="title">Completed</h3>
            <ul id="completed-tasks">
                <li>
                    <input type="checkbox" checked><label class="element-task">See the Doctor</label>
                    <input type="text" class="element-task"><button class="edt-btn btn">Edit</button>
                    <button class="del-btn btn"><img src="./remove.svg"></button>
                </li>
            </ul>
        </div>
        <script src="app.js"></script>
    </body>
</html>
